<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form>
        <p>
            Name: <input type="text" placeholder="Sandhya"><br>
            Age: <input type="number" placeholder="20"><br>
            Email: <input type="email" placeholder="sandhya@example.com"><br>
            Gender: <input type="radio" name="gender" value="1"> Female
            <input type="radio" name="gender" value="2"> Male<br>
            Hobbies: <input type="checkbox" name="hobby1" value="1"> Reading
            <input type="checkbox" name="hobby2" value="2"> Traveling<br>
            qualification: <select>
                <option value="10th">12th</option>
                <option value="12th">b tech</option>
                <option value="B tech">M tech</option>
            </select><br>
            Password: <input type="password" placeholder="1234"><br>
            Date: <input type="date"><br>
            Time: <input type="time"><br>
            file: <input type="file"><br>
            submit: <input type="submit" value="Submit">
            button: <input type="button" value="Clear">
        </p>
    </form>
     <header>
        <div> id="1" </div>
        <div> id="2" </div>
        <div> class="AID" </div>
        label: <label for="java">Name:</label>

        </div>
     </header>
    footer: <input type="6" value="Footer"><br>
</body>
</html>
