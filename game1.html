<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1d2939;
            color: white;
            padding-top: 50px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .score {
            margin: 20px;
            font-size: 20px;
        }

        #result {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>Rock Paper Scissors</h1>

    <div class="score">
        You: <span id="player">0</span> |
        Computer: <span id="computer">0</span> |
        Round: <span id="round">1</span>
    </div>

    <button onclick="play('rock')">🪨 Rock</button>
    <button onclick="play('paper')">📄 Paper</button>
    <button onclick="play('scissors')">✂️ Scissors</button>

    <h3 id="choices">Choose an option</h3>
    <h2 id="result"></h2>

    <button onclick="resetGame()">Reset</button>

    <script>
        let playerScore = 0;
        let computerScore = 0;
        let round = 1;

        function play(playerChoice) {
            let choices = ["rock", "paper", "scissors"];
            let computerChoice = choices[Math.floor(Math.random() * 3)];

            document.getElementById("choices").innerText =
                `You: ${playerChoice} | Computer: ${computerChoice}`;

            let result = "";

            if (playerChoice === computerChoice) {
                result = "Tie!";
            }
            else if (
                (playerChoice === "rock" && computerChoice === "scissors") ||
                (playerChoice === "paper" && computerChoice === "rock") ||
                (playerChoice === "scissors" && computerChoice === "paper")
            ) {
                result = "You Win!";
                playerScore++;
            }
            else {
                result = "Computer Wins!";
                computerScore++;
            }

            document.getElementById("result").innerText = result;
            document.getElementById("player").innerText = playerScore;
            document.getElementById("computer").innerText = computerScore;
            document.getElementById("round").innerText = round++;
        }

        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            round = 1;

            document.getElementById("player").innerText = 0;
            document.getElementById("computer").innerText = 0;
            document.getElementById("round").innerText = 1;
            document.getElementById("choices").innerText = "Choose an option";
            document.getElementById("result").innerText = "";
        }
    </script>

</body>

</html>
