<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors Game</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1d2939, #3b4d6e);
            color: #f5f7ff;
        }

        .container {
            width: min(720px, 92vw);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
            text-align: center;
        }

        h1 {
            margin: 0 0 20px;
            font-size: 2.4rem;
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 26px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 18px;
            padding: 18px 24px;
            min-width: 140px;
        }

        .score-box strong {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #d1d5db;
        }

        .score-box span {
            font-size: 2rem;
            display: block;
            margin-top: 4px;
            color: #fff;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .choice-button {
            width: 130px;
            padding: 18px;
            border: 2px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
            color: #f5f7ff;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .choice-button:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.14);
        }

        .result-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 22px;
            padding: 24px;
            margin-top: 10px;
        }

        .result-card p {
            margin: 12px 0;
            font-size: 1.05rem;
        }

        .result-card strong {
            display: block;
            margin-top: 12px;
            font-size: 1.35rem;
            color: #ffda79;
        }

        .reset-button {
            margin-top: 18px;
            background: #22c55e;
            border: none;
            color: #0f172a;
            padding: 14px 26px;
            border-radius: 14px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .reset-button:hover {
            transform: translateY(-2px);
            background: #4ade80;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>

        <div class="scoreboard">
            <div class="score-box">
                <strong>Your Score</strong>
                <span id="playerScore">0</span>
            </div>
            <div class="score-box">
                <strong>Computer Score</strong>
                <span id="computerScore">0</span>
            </div>
            <div class="score-box">
                <strong>Round</strong>
                <span id="roundNumber">1</span>
            </div>
        </div>

        <div class="choices">
            <button class="choice-button" data-choice="rock">Rock</button>
            <button class="choice-button" data-choice="paper">Paper</button>
            <button class="choice-button" data-choice="scissors">Scissors</button>
        </div>

        <div class="result-card">
            <p>Player choice: <strong id="playerChoice">-</strong></p>
            <p>Computer choice: <strong id="computerChoice">-</strong></p>
            <p>Result: <strong id="resultText">Make a choice to start</strong></p>
        </div>

        <button class="reset-button" id="resetButton">Reset Game</button>
    </div>

    <script>
        const buttons = document.querySelectorAll('.choice-button');
        const playerScoreEl = document.getElementById('playerScore');
        const computerScoreEl = document.getElementById('computerScore');
        const roundNumberEl = document.getElementById('roundNumber');
        const playerChoiceEl = document.getElementById('playerChoice');
        const computerChoiceEl = document.getElementById('computerChoice');
        const resultTextEl = document.getElementById('resultText');
        const resetButton = document.getElementById('resetButton');

        let playerScore = 0;
        let computerScore = 0;
        let roundNumber = 1;

        function computerChoice() {
            const choices = ['rock', 'paper', 'scissors'];
            return choices[Math.floor(Math.random() * choices.length)];
        }

        function getRoundResult(player, computer) {
            if (player === computer) {
                return 'Tie';
            }

            if (
                (player === 'rock' && computer === 'scissors') ||
                (player === 'paper' && computer === 'rock') ||
                (player === 'scissors' && computer === 'paper')
            ) {
                return 'Player';
            }

            return 'Computer';
        }

        function updateUI(playerChoice, computerChoice, roundResult) {
            playerChoiceEl.textContent = playerChoice;
            computerChoiceEl.textContent = computerChoice;
            if (roundResult === 'Tie') {
                resultTextEl.textContent = 'It is a tie!';
            } else if (roundResult === 'Player') {
                resultTextEl.textContent = 'You win this round!';
            } else {
                resultTextEl.textContent = 'Computer wins this round!';
            }

            playerScoreEl.textContent = playerScore;
            computerScoreEl.textContent = computerScore;
            roundNumberEl.textContent = roundNumber;
        }

        function playRound(choice) {
            const computer = computerChoice();
            const roundResult = getRoundResult(choice, computer);

            if (roundResult === 'Player') {
                playerScore += 1;
            } else if (roundResult === 'Computer') {
                computerScore += 1;
            }

            updateUI(choice, computer, roundResult);
            roundNumber += 1;
        }

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                playRound(button.dataset.choice);
            });
        });

        resetButton.addEventListener('click', () => {
            playerScore = 0;
            computerScore = 0;
            roundNumber = 1;
            playerChoiceEl.textContent = '-';
            computerChoiceEl.textContent = '-';
            resultTextEl.textContent = 'Make a choice to start';
            playerScoreEl.textContent = playerScore;
            computerScoreEl.textContent = computerScore;
            roundNumberEl.textContent = roundNumber;
        });
    </script>
</body>

</html>
